version: "3.9"

services:
  # PostgreSQL データベース
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: coding_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    networks:
      - coding-agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d coding_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ メッセージブローカー
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-agent}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "15672:15672"  # 管理UI（開発用）
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - coding-agent-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Producer サービス
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    environment:
      GITLAB_PAT: ${GITLAB_PAT}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-agent}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD}@postgres:5432/coding_agent
      USER_CONFIG_API_URL: http://backend:8080
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coding-agent-network

  # Consumer サービス（複数台起動）
  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    environment:
      GITLAB_PAT: ${GITLAB_PAT}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-agent}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD}@postgres:5432/coding_agent
      USER_CONFIG_API_URL: http://backend:8080
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      # Docker-outside-of-Docker: ホストのDocker daemonに接続
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coding-agent-network
    deploy:
      replicas: 1  # Consumer 5台起動（最大10台まで拡張可能）

  # Backend（User Config API）サービス
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD}@postgres:5432/coding_agent
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coding-agent-network

  # Frontend（Vue.js）サービス
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - coding-agent-network

  # 試験用 GitLab CE（--profile testing 指定時のみ起動）
  # 起動コマンド例: docker-compose --profile testing up gitlab
  gitlab:
    image: gitlab/gitlab-ce:latest
    profiles:
      - testing
    hostname: gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:${GITLAB_TEST_PORT:-8929}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_TEST_SSH_PORT:-2289}
        # 試験用の軽量設定（Prometheusスタック全体を無効化してメモリ使用量を削減）
        # grafana等は GitLab 16+ で廃止済みのため個別指定は不要
        prometheus_monitoring['enable'] = false
        # プロセス数を最小化
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 4
    ports:
      - "${GITLAB_TEST_PORT:-8929}:80"
      - "${GITLAB_TEST_SSH_PORT:-2289}:22"
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    networks:
      - coding-agent-network
    # 初回起動は数分かかるため start_period を長めに設定
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    shm_size: "256m"

volumes:
  postgres_data:
  rabbitmq_data:
  gitlab_config:
  gitlab_logs:
  gitlab_data:

networks:
  coding-agent-network:
    driver: bridge
