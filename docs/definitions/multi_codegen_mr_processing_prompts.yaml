       - major: 規約違反（コード例含有・将来計画記載）・不完全なセクション・Mermaid図の誤り
       - minor: 用語統一・可読性・リンク整備
    6. 再実行判定：
       - critical問題がある場合: re_execute を返し、具体的な修正指示を明記する
