    4. 以下の観点で成果物を評価する：
       - 計画準拠性: 実行計画で定義されたすべてのセクションが作成されているか
       - Todo完了状況: Todoリストのすべての項目が完了（completed）になっているか
       - 正確性: APIエンドポイント・設定キー・コマンド例・動作説明が実際のコードと一致しているか
